<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>GemVerse v0.5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/scenes.css">
</head>
<body>
<div id="app">
  <header>
    <h1>🌌 GemVerse <small>v0.5.0</small></h1>
  </header>
  <div id="hud">
    <div class="hud-group">
      <div class="hud-box"><span class="hud-icon">⭐</span><span class="hud-text"><span class="hud-label">คะแนน</span><span id="score" class="hud-value">0</span></span></div>
      <div class="hud-box"><span class="hud-icon">🔥</span><span class="hud-text"><span class="hud-label">ทวีคูณ</span><span id="mult" class="hud-value">x1.0</span></span></div>
    </div>
    <button id="mute" class="hud-btn" aria-label="เปิด/ปิดเสียง">🔊</button>
  </div>
  <canvas id="game"></canvas>
  <p id="hint">ปัด/แตะ 2 ช่องติดกันเพื่อสลับ • เรียง 4 = ☄️ ดาวหางล้างแถว/คอลัมน์ • บล็อก 2x2 = 🚀 จรวดล่าเป้าหมาย • รูป L/T = 💣 ระเบิด 3x3 • เรียง 5 = 🌟 โนวาล้างสี • สลับ 2 ตัวพิเศษ = 💥 คอมโบใหญ่ • แตะ 🔊 เพื่อปิดเสียง</p>
</div>
<div id="scene-root"></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
